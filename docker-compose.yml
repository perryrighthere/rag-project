services:
  app:
    build:
      context: .
    image: rag-project:local
    ports:
      - "${APP_PORT:-8000}:8000"
    environment:
      APP_NAME: ${APP_NAME:-rag-project}
      APP_ENV: ${APP_ENV:-local}
      API_PREFIX: ${API_PREFIX:-}

      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://rag:rag@host.docker.internal:5432/rag}

      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-host.docker.internal:9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-rag-project}
      MINIO_SECURE: ${MINIO_SECURE:-false}
      MINIO_PUBLIC_ENDPOINT: ${MINIO_PUBLIC_ENDPOINT:-http://localhost:9000}

      MINERU_BASE_URL: ${MINERU_BASE_URL:-http://host.docker.internal:18000}
      MINERU_BACKEND: ${MINERU_BACKEND:-pipeline}
      MINERU_PARSE_METHOD: ${MINERU_PARSE_METHOD:-auto}
      MINERU_LANG_LIST: ${MINERU_LANG_LIST:-["ch"]}
      MINERU_REQUEST_TIMEOUT: ${MINERU_REQUEST_TIMEOUT:-60}
      MINERU_POLL_INTERVAL_SECONDS: ${MINERU_POLL_INTERVAL_SECONDS:-2}
      MINERU_MAX_WAIT_SECONDS: ${MINERU_MAX_WAIT_SECONDS:-600}

      VLM_IMAGE_EXPLANATIONS_ENABLED: ${VLM_IMAGE_EXPLANATIONS_ENABLED:-false}
      VLM_BASE_URL: ${VLM_BASE_URL:-}
      VLM_API_KEY: ${VLM_API_KEY:-EMPTY}
      VLM_MODEL: ${VLM_MODEL:-}
      VLM_PROMPT: ${VLM_PROMPT:-}
      VLM_TIMEOUT: ${VLM_TIMEOUT:-120}
      VLM_MAX_TOKENS: ${VLM_MAX_TOKENS:-300}

      EMBEDDING_BASE_URL: ${EMBEDDING_BASE_URL:-}
      EMBEDDING_API_KEY: ${EMBEDDING_API_KEY:-EMPTY}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-}
      EMBEDDING_DIM: ${EMBEDDING_DIM:-1024}
      EMBEDDING_BATCH_SIZE: ${EMBEDDING_BATCH_SIZE:-32}
      EMBEDDING_TIMEOUT: ${EMBEDDING_TIMEOUT:-60}

      MILVUS_URI: ${MILVUS_URI:-http://host.docker.internal:19530}
      MILVUS_COLLECTION: ${MILVUS_COLLECTION:-rag_chunks}

      RERANK_BASE_URL: ${RERANK_BASE_URL:-}
      RERANK_API_KEY: ${RERANK_API_KEY:-EMPTY}
      RERANK_MODEL: ${RERANK_MODEL:-}
      RERANK_TIMEOUT: ${RERANK_TIMEOUT:-60}

      CHAT_BASE_URL: ${CHAT_BASE_URL:-}
      CHAT_API_KEY: ${CHAT_API_KEY:-EMPTY}
      CHAT_MODEL: ${CHAT_MODEL:-}
      CHAT_TIMEOUT: ${CHAT_TIMEOUT:-60}
      CHAT_TEMPERATURE: ${CHAT_TEMPERATURE:-0.2}
      CHAT_MAX_TOKENS: ${CHAT_MAX_TOKENS:-1200}
